<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON SERPENT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020408;
    --grid: #0a1520;
    --neon-green: #00ff88;
    --neon-cyan: #00e5ff;
    --neon-pink: #ff006e;
    --neon-yellow: #ffea00;
    --glow-g: 0 0 8px #00ff88, 0 0 20px #00ff88aa, 0 0 40px #00ff8855;
    --glow-c: 0 0 8px #00e5ff, 0 0 20px #00e5ffaa;
    --glow-p: 0 0 8px #ff006e, 0 0 20px #ff006eaa, 0 0 40px #ff006e55;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Orbitron', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPulse 6s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes gridPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  header {
    text-align: center;
  }

  h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    letter-spacing: 0.3em;
    color: var(--neon-cyan);
    text-shadow: var(--glow-c);
    animation: titleFlicker 5s infinite;
  }

  @keyframes titleFlicker {
    0%, 94%, 100% { opacity: 1; }
    95% { opacity: 0.85; }
    96% { opacity: 1; }
    97% { opacity: 0.9; }
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5em;
    color: var(--neon-pink);
    text-shadow: var(--glow-p);
    margin-top: 4px;
  }

  #hud {
    display: flex;
    gap: 40px;
    align-items: center;
  }

  .hud-block {
    text-align: center;
  }

  .hud-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(0,229,255,0.5);
    margin-bottom: 4px;
  }

  .hud-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px #ffea00, 0 0 20px #ffea0088;
    min-width: 60px;
    transition: transform 0.1s;
  }

  .hud-value.pop {
    animation: pop 0.15s ease-out;
  }

  @keyframes pop {
    0% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  .hud-divider {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--neon-cyan), transparent);
    opacity: 0.4;
  }

  /* Canvas container */
  #canvas-container {
    position: relative;
    border: 1px solid rgba(0,229,255,0.2);
    box-shadow:
      0 0 0 1px rgba(0,229,255,0.05),
      0 0 30px rgba(0,229,255,0.08),
      inset 0 0 60px rgba(0,0,0,0.8);
  }

  #canvas-container::before,
  #canvas-container::after {
    content: '';
    position: absolute;
    inset: -1px;
    border: 1px solid transparent;
  }

  #canvas-container::before {
    border-top-color: var(--neon-cyan);
    border-left-color: var(--neon-cyan);
    opacity: 0.5;
  }

  #canvas-container::after {
    border-bottom-color: var(--neon-pink);
    border-right-color: var(--neon-pink);
    opacity: 0.5;
  }

  canvas {
    display: block;
    background: var(--bg);
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    z-index: 2;
  }
  .corner.tl { top: -4px; left: -4px; border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); box-shadow: var(--glow-c); }
  .corner.tr { top: -4px; right: -4px; border-top: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-cyan); box-shadow: var(--glow-c); }
  .corner.bl { bottom: -4px; left: -4px; border-bottom: 2px solid var(--neon-pink); border-left: 2px solid var(--neon-pink); box-shadow: var(--glow-p); }
  .corner.br { bottom: -4px; right: -4px; border-bottom: 2px solid var(--neon-pink); border-right: 2px solid var(--neon-pink); box-shadow: var(--glow-p); }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(2,4,8,0.88);
    backdrop-filter: blur(2px);
    z-index: 10;
    gap: 18px;
    transition: opacity 0.3s;
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(20px, 4vw, 36px);
    font-weight: 900;
    letter-spacing: 0.25em;
  }

  .overlay-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: rgba(0,229,255,0.6);
  }

  .overlay-score {
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px #ffea00;
  }

  .btn {
    margin-top: 8px;
    padding: 12px 36px;
    background: transparent;
    border: 1px solid var(--neon-green);
    color: var(--neon-green);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.2s, box-shadow 0.2s;
    text-shadow: var(--glow-g);
    box-shadow: 0 0 12px rgba(0,255,136,0.2), inset 0 0 12px rgba(0,255,136,0.05);
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--neon-green);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s ease;
    z-index: -1;
  }

  .btn:hover { color: #020408; text-shadow: none; box-shadow: var(--glow-g); }
  .btn:hover::before { transform: scaleX(1); }

  /* Controls hint */
  #controls {
    display: flex;
    gap: 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(0,229,255,0.35);
  }

  .key {
    display: inline-block;
    border: 1px solid rgba(0,229,255,0.2);
    padding: 2px 7px;
    border-radius: 3px;
    margin-right: 4px;
    color: rgba(0,229,255,0.5);
  }

  /* Level indicator */
  #level-bar-container {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #level-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(0,229,255,0.4);
    white-space: nowrap;
  }

  #level-bar {
    flex: 1;
    height: 3px;
    background: rgba(0,229,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  #level-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
    box-shadow: var(--glow-c);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* D-Pad */
  #dpad {
    display: none;
    position: relative;
    width: 156px;
    height: 156px;
    margin-top: 4px;
    flex-shrink: 0;
  }

  @media (pointer: coarse) {
    #dpad { display: grid; }
    #controls { display: none; }
  }

  #dpad {
    display: grid;
    grid-template-columns: 52px 52px 52px;
    grid-template-rows: 52px 52px 52px;
  }

  .dpad-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,229,255,0.05);
    border: 1px solid rgba(0,229,255,0.18);
    color: var(--neon-cyan);
    font-size: 20px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s, box-shadow 0.1s;
    touch-action: manipulation;
  }

  .dpad-btn:active, .dpad-btn.pressed {
    background: rgba(0,229,255,0.18);
    box-shadow: inset 0 0 12px rgba(0,229,255,0.3), 0 0 10px rgba(0,229,255,0.2);
    color: #fff;
  }

  .dpad-btn.up    { grid-column: 2; grid-row: 1; border-radius: 6px 6px 0 0; }
  .dpad-btn.left  { grid-column: 1; grid-row: 2; border-radius: 6px 0 0 6px; }
  .dpad-btn.center{ grid-column: 2; grid-row: 2; background: rgba(0,229,255,0.03); cursor: default; }
  .dpad-btn.right { grid-column: 3; grid-row: 2; border-radius: 0 6px 6px 0; }
  .dpad-btn.down  { grid-column: 2; grid-row: 3; border-radius: 0 0 6px 6px; }

  /* show dpad always on touch devices, hide on desktop */
  @media (hover: hover) and (pointer: fine) {
    #dpad { display: none !important; }
    #controls { display: flex !important; }
  }
</style>
</head>
<body>
<div id="game-wrapper">

  <header>
    <h1>NEON SERPENT</h1>
    <div class="subtitle">// ARCADE EDITION //</div>
  </header>

  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="score">0</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-block">
      <div class="hud-label">BEST</div>
      <div class="hud-value" id="best">0</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-block">
      <div class="hud-label">LEVEL</div>
      <div class="hud-value" id="level">1</div>
    </div>
  </div>

  <div id="level-bar-container">
    <span id="level-label">LEVEL PROGRESS</span>
    <div id="level-bar"><div id="level-fill"></div></div>
  </div>

  <div id="canvas-container">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <canvas id="c"></canvas>

    <!-- Start screen -->
    <div class="overlay" id="start-screen">
      <div class="overlay-title" style="color:var(--neon-cyan);text-shadow:var(--glow-c)">NEON SERPENT</div>
      <div class="overlay-sub">GUIDE THE SERPENT. CONSUME THE NODES.</div>
      <button class="btn" onclick="startGame()">INITIALIZE</button>
    </div>

    <!-- Game over screen -->
    <div class="overlay hidden" id="over-screen">
      <div class="overlay-title" style="color:var(--neon-pink);text-shadow:var(--glow-p)">SYSTEM FAIL</div>
      <div class="overlay-score" id="final-score"></div>
      <div class="overlay-sub" id="new-best-msg" style="display:none;color:var(--neon-yellow)">★ NEW HIGH SCORE ★</div>
      <button class="btn" onclick="startGame()">RESTART</button>
    </div>

    <!-- Pause screen -->
    <div class="overlay hidden" id="pause-screen">
      <div class="overlay-title" style="color:var(--neon-yellow);text-shadow:0 0 8px #ffea00,0 0 20px #ffea0088">PAUSED</div>
      <div class="overlay-sub">PRESS P TO RESUME</div>
    </div>
  </div>

  <div id="controls">
    <span><span class="key">↑↓←→</span> MOVE</span>
    <span><span class="key">WASD</span> MOVE</span>
    <span><span class="key">P</span> PAUSE</span>
  </div>

  <!-- Mobile D-Pad -->
  <div id="dpad">
    <button class="dpad-btn up"    id="btn-up"    ontouchstart="dpadPress({x:0,y:-1})" ontouchend="dpadRelease('btn-up')">▲</button>
    <button class="dpad-btn left"  id="btn-left"  ontouchstart="dpadPress({x:-1,y:0})" ontouchend="dpadRelease('btn-left')">◀</button>
    <div    class="dpad-btn center"></div>
    <button class="dpad-btn right" id="btn-right" ontouchstart="dpadPress({x:1,y:0})"  ontouchend="dpadRelease('btn-right')">▶</button>
    <button class="dpad-btn down"  id="btn-down"  ontouchstart="dpadPress({x:0,y:1})"  ontouchend="dpadRelease('btn-down')">▼</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive sizing
const COLS = 22, ROWS = 22;
let CELL;
(function resize() {
  const maxW = Math.min(window.innerWidth - 40, 520);
  const maxH = Math.min(window.innerHeight - 260, 520);
  const size = Math.floor(Math.min(maxW, maxH) / COLS) * COLS;
  CELL = size / COLS;
  canvas.width = size;
  canvas.height = size;
  document.getElementById('level-bar-container').style.width = size + 'px';
})();

// Game state
let snake, dir, nextDir, food, particles, score, best, level, gameLoop, running, paused;
best = parseInt(localStorage.getItem('neon_best') || '0');
document.getElementById('best').textContent = best;

// Colors for food types
const FOOD_TYPES = [
  { color: '#ff006e', glow: '#ff006e', points: 1, size: 0.55 },
  { color: '#ffea00', glow: '#ffea00', points: 3, size: 0.45 },
  { color: '#00ff88', glow: '#00ff88', points: 5, size: 0.38 },
];

function startGame() {
  show('start-screen', false);
  show('over-screen', false);
  show('pause-screen', false);

  snake = [
    { x: 10, y: 11 },
    { x: 9,  y: 11 },
    { x: 8,  y: 11 },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  particles = [];
  score = 0;
  level = 1;
  running = true;
  paused = false;

  updateHUD();
  spawnFood();

  clearInterval(gameLoop);
  gameLoop = setInterval(tick, getSpeed());
}

function getSpeed() {
  return Math.max(80, 160 - (level - 1) * 12);
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));

  // Higher levels spawn rarer (high-value) food more
  const roll = Math.random();
  let type;
  if (roll < 0.6) type = 0;
  else if (roll < 0.85) type = 1;
  else type = 2;

  food = { ...pos, ...FOOD_TYPES[type], pulse: 0 };
}

function tick() {
  if (!running || paused) return;

  dir = { ...nextDir };
  const head = { x: (snake[0].x + dir.x + COLS) % COLS, y: (snake[0].y + dir.y + ROWS) % ROWS };

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += food.points * level;
    burstParticles(food.x, food.y, food.color, food.points);
    spawnFood();
    updateHUD();

    // Level up every 10 points base
    const newLevel = Math.floor(score / (10)) + 1;
    if (newLevel > level) {
      level = newLevel;
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, getSpeed());
      updateHUD();
      levelUpFlash();
    }

    // Animate score
    const el = document.getElementById('score');
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  } else {
    snake.pop();
  }

  draw();
}

function endGame() {
  running = false;
  clearInterval(gameLoop);

  if (score > best) {
    best = score;
    localStorage.setItem('neon_best', best);
    document.getElementById('best').textContent = best;
    document.getElementById('new-best-msg').style.display = 'block';
  } else {
    document.getElementById('new-best-msg').style.display = 'none';
  }

  document.getElementById('final-score').textContent = `SCORE: ${score}`;
  show('over-screen', true);
  deathShake();
}

function show(id, visible) {
  document.getElementById(id).classList.toggle('hidden', !visible);
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  // Level bar: fill based on progress to next level
  const threshold = level * 10;
  const prev = (level - 1) * 10;
  const pct = Math.min(100, ((score - prev) / (threshold - prev)) * 100);
  document.getElementById('level-fill').style.width = pct + '%';
}

// Particles
function burstParticles(gx, gy, color, count) {
  const cx = (gx + 0.5) * CELL;
  const cy = (gy + 0.5) * CELL;
  for (let i = 0; i < 8 + count * 3; i++) {
    const angle = (Math.PI * 2 * i) / (8 + count * 3) + Math.random() * 0.5;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, decay: 0.035 + Math.random() * 0.04,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(0,229,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
  }

  // Particles
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life -= p.decay;
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Food
  food.pulse = (food.pulse || 0) + 0.08;
  const fp = Math.sin(food.pulse) * 0.12 + 0.88;
  const fc = (food.x + 0.5) * CELL;
  const fr = (food.y + 0.5) * CELL;
  const fr2 = CELL * food.size * fp;

  ctx.shadowColor = food.glow;
  ctx.shadowBlur = 18;
  ctx.fillStyle = food.color;
  ctx.beginPath();
  ctx.arc(fc, fr, fr2, 0, Math.PI * 2);
  ctx.fill();

  // Inner highlight
  const g = ctx.createRadialGradient(fc - fr2 * 0.3, fr - fr2 * 0.3, 0, fc, fr, fr2);
  g.addColorStop(0, 'rgba(255,255,255,0.6)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(fc, fr, fr2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  for (let i = snake.length - 1; i >= 0; i--) {
    const seg = snake[i];
    const t = i / snake.length;

    // Gradient from cyan head to green tail
    const r1 = Math.round(0 + t * 0);
    const g1 = Math.round(229 - t * 100);
    const b1 = Math.round(255 - t * 100);
    const segColor = `rgb(${r1},${g1},${b1})`;

    const pad = 1.5;
    const x = seg.x * CELL + pad;
    const y = seg.y * CELL + pad;
    const w = CELL - pad * 2;

    ctx.shadowColor = i === 0 ? '#00e5ff' : '#00ff88';
    ctx.shadowBlur = i === 0 ? 18 : 8;
    ctx.fillStyle = segColor;

    // Rounded rect
    const r = 3;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + w - r);
    ctx.quadraticCurveTo(x + w, y + w, x + w - r, y + w);
    ctx.lineTo(x + r, y + w);
    ctx.quadraticCurveTo(x, y + w, x, y + w - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();

    // Head eyes
    if (i === 0) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#020408';
      const eyeOff = CELL * 0.2;
      let e1, e2;
      if (dir.x === 1)       { e1 = [x+w-eyeOff, y+eyeOff]; e2 = [x+w-eyeOff, y+w-eyeOff]; }
      else if (dir.x === -1) { e1 = [x+eyeOff,   y+eyeOff]; e2 = [x+eyeOff,   y+w-eyeOff]; }
      else if (dir.y === -1) { e1 = [x+eyeOff,   y+eyeOff]; e2 = [x+w-eyeOff, y+eyeOff]; }
      else                   { e1 = [x+eyeOff,   y+w-eyeOff]; e2 = [x+w-eyeOff, y+w-eyeOff]; }

      for (const [ex, ey] of [e1, e2]) {
        ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#00e5ff';
        ctx.beginPath(); ctx.arc(ex, ey, 1, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#020408';
      }
    }
  }
  ctx.shadowBlur = 0;
}

// Level up flash
function levelUpFlash() {
  const el = document.getElementById('level');
  el.style.color = '#00ff88';
  el.style.textShadow = '0 0 8px #00ff88, 0 0 30px #00ff88';
  setTimeout(() => {
    el.style.color = '';
    el.style.textShadow = '';
  }, 600);
}

// Death shake
function deathShake() {
  const w = document.getElementById('game-wrapper');
  w.style.animation = 'shake 0.4s ease';
  setTimeout(() => w.style.animation = '', 400);
}

// Inject shake keyframes
const style = document.createElement('style');
style.textContent = `
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    15%{transform:translateX(-8px)}
    30%{transform:translateX(8px)}
    45%{transform:translateX(-6px)}
    60%{transform:translateX(6px)}
    75%{transform:translateX(-3px)}
    90%{transform:translateX(3px)}
  }
`;
document.head.appendChild(style);

// Input
const keyMap = {
  ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1}, ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
  w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0},
  W: {x:0,y:-1}, S: {x:0,y:1}, A: {x:-1,y:0}, D: {x:1,y:0},
};

document.addEventListener('keydown', e => {
  if (e.key === 'p' || e.key === 'P') {
    if (!running) return;
    paused = !paused;
    show('pause-screen', paused);
    return;
  }
  if (!running || paused) return;
  const d = keyMap[e.key];
  if (d && !(d.x === -dir.x && d.y === -dir.y)) {
    nextDir = d;
    e.preventDefault();
  }
});

// Touch / swipe support
let touch0;
canvas.addEventListener('touchstart', e => { touch0 = e.touches[0]; }, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touch0) return;
  const dx = e.changedTouches[0].clientX - touch0.clientX;
  const dy = e.changedTouches[0].clientY - touch0.clientY;
  if (Math.abs(dx) > Math.abs(dy)) {
    nextDir = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  } else {
    nextDir = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  }
  if (nextDir.x === -dir.x && nextDir.y === -dir.y) nextDir = dir;
}, { passive: true });

// D-Pad handlers
function dpadPress(d) {
  if (!running) { startGame(); return; }
  if (paused) return;
  if (!(d.x === -dir.x && d.y === -dir.y)) nextDir = d;
}
function dpadRelease(id) {
  const el = document.getElementById(id);
  if (el) { el.classList.add('pressed'); setTimeout(() => el.classList.remove('pressed'), 120); }
}

// Initial draw
draw();
</script>
</body>
</html>
